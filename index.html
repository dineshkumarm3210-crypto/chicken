<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Coop Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🐔 Chicken Coop Manager</h1>
    </header>
<div id="loginPage" class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
    <!-- இங்க உன்னோட Dashboard code இருக்கும் -->
    <div class="container">

        <div class="card">
            <h2>Total Chickens</h2>
            <p id="chickenCount">500</p>
        </div>

        <div class="card">
            <h2>Eggs Today</h2>
            <p id="eggCount">420</p>
        </div>

        <div class="card">
            <h2>Feed Stock</h2>
            <p id="feedStock">350 Kg</p>
        </div>

        <div class="card">
            <h2>Income</h2>
            <p id="income">₹12,500</p>
        </div>

        <button onclick="addChicken()">
            Add Chicken
        </button>

        <button onclick="removeChicken()">
            Remove Chicken
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
